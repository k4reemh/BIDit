# Render blueprint for the BIDit BACKEND + Postgres.
# (The web app is deployed separately on Vercel — see docs/DEPLOY.md.)
#
# Why not the free plan: the backend must stay always-on — it holds live
# WebSocket connections and runs the auction/deposit/giveaway background loops.
# Render's free web services sleep on inactivity, which would drop sockets and
# stop detecting deposits. Use "starter" (or bump as needed).

databases:
  - name: bidit-db
    databaseName: bidit
    plan: basic-256mb # smallest paid; a friends test fits easily
    postgresMajorVersion: "17"

services:
  - type: web
    name: bidit-backend
    runtime: node
    plan: starter # always-on required for WebSockets + background pollers
    healthCheckPath: /
    buildCommand: npm install && npm run prisma:generate -w @bidit/backend && npm run deploy:push -w @bidit/backend
    startCommand: npm run start -w @bidit/backend
    envVars:
      # install devDeps (tsx + prisma are needed to build/run) and pin Node
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: bidit-db
          property: connectionString
      # ---- app config (safe to commit) ----
      - key: BIDIT_PAYOUT_MODE
        value: direct # no escrow, no fee — pay seller 100% on sale
      - key: SOLANA_CLUSTER
        value: mainnet-beta
      - key: BIDIT_ALLOW_MAINNET
        value: "yes"
      - key: USDC_MINT
        value: EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v # mainnet USDC
      - key: BIDIT_PROMO_START
        value: "2026-07-14T00:00:00-06:00" # "$100 to sell" promo opens (3-day enrollment window). Remove/blank to disable.
      # ---- secrets: set these in the Render dashboard, never commit ----
      - key: SOLANA_RPC
        sync: false # your mainnet RPC (Helius/QuickNode)
      - key: TREASURY_SECRET
        sync: false # treasury keypair (base58 or JSON array) — hot wallet
      - key: BIDIT_WALLET_SEED
        sync: false # strong, unique, backed up — controls all deposit addresses
      - key: AUTH_SECRET
        sync: false # strong random string for session tokens
