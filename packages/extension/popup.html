<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BIDit</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0; width: 300px; padding: 14px;
        font: 14px/1.45 -apple-system, system-ui, sans-serif;
        background: #ffffff; color: #0b2447;
      }
      h1 { font-size: 17px; margin: 0 0 2px; color: #0b2447; }
      h1 b { color: #ff6a00; }
      .muted { color: #5c6e88; font-size: 12px; }
      .row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
      input {
        flex: 1; min-width: 0; background: #f1f5fb; border: 1px solid rgba(11,36,71,0.12);
        color: #0b2447; border-radius: 8px; padding: 9px 11px; font-size: 14px;
      }
      input:focus { outline: none; border-color: #ff6a00; box-shadow: 0 0 0 3px rgba(255,106,0,0.14); }
      button {
        background: #ff6a00; color: #fff; border: 0; border-radius: 8px;
        padding: 9px 13px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
      }
      button:hover { background: #e85d00; }
      button.secondary { background: #eef2f8; color: #0b2447; }
      button.secondary:hover { background: #e2e9f3; }
      .card { background: #ffffff; border: 1px solid rgba(11,36,71,0.12); border-radius: 10px; padding: 12px; margin-top: 12px; }
      .conn { display: flex; align-items: center; gap: 7px; font-size: 13px; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #e0a012; }
      .dot.on { background: #0e9f6e; } .dot.off { background: #ef3b4e; }
      .bal { display: flex; justify-content: space-between; margin-top: 10px; font-variant-numeric: tabular-nums; }
      .bal b { font-size: 16px; color: #0b2447; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1><b>BID</b>it</h1>
    <div class="muted">Live card auctions on Pump.fun.</div>

    <div id="loginView">
      <div class="row"><input id="email" type="email" placeholder="email" autocomplete="username" /></div>
      <div class="row">
        <input id="password" type="password" placeholder="password" autocomplete="current-password" />
        <button id="loginBtn">Sign in</button>
      </div>
      <div id="loginError" class="hidden" style="color:#f87171;font-size:12px;margin-top:8px"></div>
      <div class="muted" style="margin-top:8px">Use the same account you made on the BIDit website. Sign up & add funds there first.</div>
    </div>

    <div id="accountView" class="hidden">
      <div class="card">
        <div class="conn"><span id="dot" class="dot"></span> <span id="connText">…</span></div>
        <div class="bal"><span class="muted">Wallet balance</span> <b id="settled">—</b></div>
        <div class="row">
          <button id="logoutBtn" class="secondary">Log out</button>
        </div>
      </div>
      <div class="muted" style="margin-top:10px">
        Open a Pump.fun coin page to see the auction panel and bid.
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
